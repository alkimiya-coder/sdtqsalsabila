<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Login Admin - SDTQ Salsabila</title>
  </head>
  <body class="bg-gray-100 h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-96">
      <h1 class="text-2xl font-bold text-center mb-6 text-red-800">
        Admin Login
      </h1>
      <form action="/login" method="POST" class="space-y-4">
        <input
          type="password"
          name="password"
          placeholder="Masukkan Password"
          class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-red-500"
          required
        />
        <button
          type="submit"
          class="w-full bg-red-800 text-white p-3 rounded-xl font-bold hover:bg-red-700 transition"
        >
          Masuk ke Dashboard
        </button>
      </form>
    </div>
  </body>
</html>
