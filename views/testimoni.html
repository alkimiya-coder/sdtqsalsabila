<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kirim Testimoni - Nama Sekolah Anda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
      }
      .bg-brand {
        background-color: #801b33;
      } /* Maroon */
      .text-brand {
        color: #801b33;
      }
      .border-brand {
        border-color: #d4af37;
      } /* Gold */
    </style>
  </head>
  <body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
    <div
      class="max-w-xl w-full bg-white rounded-3xl shadow-xl overflow-hidden border-t-8 border-brand"
    >
      <div class="p-8">
        <div class="text-center mb-8">
          <h1 class="text-2xl font-black text-brand uppercase tracking-tight">
            Kesan & Pesan
          </h1>
          <p class="text-gray-500 text-sm mt-2">
            Terima kasih telah menjadi bagian dari keluarga besar kami. Bagikan
            pengalaman berkesan Anda di sini.
          </p>
        </div>
        <form id="formTesti" class="space-y-5">
          <div>
            <label
              class="block text-xs font-black text-gray-400 uppercase mb-2"
            >
              Nama Lengkap
            </label>
            <input
              type="text"
              name="nama"
              required
              class="w-full px-4 py-3 rounded-xl border-2 border-gray-100 focus:border-brand outline-none transition"
              placeholder="Contoh: Ayah Budi / Alumni 2023"
            />
          </div>

          <div>
            <label
              class="block text-xs font-black text-gray-400 uppercase mb-2"
            >
              Pesan Singkat
            </label>
            <input
              type="text"
              name="pesan"
              required
              class="w-full px-4 py-3 rounded-xl border-2 border-gray-100 focus:border-brand outline-none transition"
              placeholder="Contoh: Maju terus sekolahku!"
            />
          </div>

          <div>
            <label
              class="block text-xs font-black text-gray-400 uppercase mb-2"
            >
              Kesan (Testimoni)
            </label>
            <textarea
              name="kesan"
              required
              rows="4"
              class="w-full px-4 py-3 rounded-xl border-2 border-gray-100 focus:border-brand outline-none transition"
              placeholder="Tuliskan pengalaman berkesan Anda..."
            ></textarea>
          </div>

          <button
            type="submit"
            id="btnSubmit"
            class="w-full bg-brand text-white font-bold py-4 rounded-xl shadow-lg hover:opacity-90 transition transform hover:-translate-y-1"
          >
            Kirim Testimoni
          </button>

          <a
            href="/"
            class="block text-center text-xs font-bold text-gray-400 uppercase hover:text-brand transition mt-4"
          >
            Kembali ke Beranda
          </a>
        </form>
      </div>
    </div>

    <script>
      const WEB_APP_URL =
        'https://script.google.com/macros/s/AKfycbw6U4XmvPLlRVkWM9BtnDNjn6l2rv-c2mtAy6qB64bDfKeLazh6uW-a1Y5gJmoH6hIW/exec'

      document
        .getElementById('formTesti')
        .addEventListener('submit', async function (e) {
          e.preventDefault()
          const btn = document.getElementById('btnSubmit')
          btn.disabled = true
          btn.innerText = 'Sedang Mengirim...'

          const formData = new FormData(this)
          const payload = {
            action: 'ADD_TESTIMONY',
            nama: formData.get('nama'),
            pesan: formData.get('pesan'), // Ambil data Pesan
            kesan: formData.get('kesan'), // Ambil data Kesan
          }

          try {
            await fetch(WEB_APP_URL, {
              method: 'POST',
              mode: 'no-cors',
              body: JSON.stringify(payload),
            })

            Swal.fire({
              icon: 'success',
              title: 'Terima Kasih!',
              text: 'Testimoni Anda telah terkirim dan akan kami tinjau.',
              confirmButtonColor: '#801B33',
            }).then(() => {
              window.location.href = '/'
            })
          } catch (error) {
            Swal.fire('Gagal', 'Terjadi kesalahan sistem.', 'error')
            btn.disabled = false
            btn.innerText = 'Kirim Testimoni'
          }
        })
    </script>
  </body>
</html>
